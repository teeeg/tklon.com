name: deploy

on:
  push:
    branches: [master]
    paths:
      - "src/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

# OIDC: assume the AWS deploy role with a short-lived token (no stored keys)
permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          working-directory: src
          bundler-cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - run: npm install

      - run: NO_CONTRACTS=true bundle exec middleman build

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::295005258746:role/tklondotcom-GitHubActionsDeployRole-KmJpDGB6eg8r
          aws-region: us-east-1

      - name: Sync to S3 and invalidate CloudFront
        run: |
          # Two-pass sync so each bucket of files gets the right Cache-Control:
          #   1. Hashed/immutable assets (CSS, JS, images, fonts) — 1y immutable.
          #      The filename embeds a content hash, so a content change always
          #      ships under a new URL; serving it forever is safe.
          #   2. HTML / feeds — short edge TTL with stale-while-revalidate, so
          #      users never wait on revalidation and updates land in ~5 min.
          # --exclude 'media/*': self-hosted videos are uploaded out-of-band by
          # `make video` and never live in build/; without this they'd be deleted.
          # Hashed assets ship first so HTML never references a missing file.
          aws s3 sync build/ s3://tklon.com-assets --delete --exclude 'media/*' \
            --exclude '*.html' --exclude '*.xml' --exclude '*.txt' \
            --cache-control 'public,max-age=31536000,immutable'
          aws s3 sync build/ s3://tklon.com-assets --delete --exclude '*' \
            --include '*.html' --include '*.xml' --include '*.txt' \
            --cache-control 'public,max-age=60,s-maxage=300,stale-while-revalidate=86400'
          aws cloudfront create-invalidation --distribution-id E12C54H3GMYHN0 \
            --paths '/*.html' '/*.xml' '/*.txt'
