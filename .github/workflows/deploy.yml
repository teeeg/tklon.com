name: deploy

on:
  push:
    branches: [master]
    paths:
      - "site/**"
      - "generator/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - ".github/workflows/deploy.yml"
  pull_request:
    paths:
      - "site/**"
      - "generator/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

# Only GitHub-/AWS-official actions here — no independent-maintainer actions.
# Dependabot keeps them on the latest secure version (.github/dependabot.yml).
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0

      # The binary reads site content at runtime, so publishing a post never
      # changes it. Keyed on the generator sources alone: a content-only merge
      # restores 30 MB and skips cargo, rustup and nasm entirely.
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        id: tklon
        with:
          path: target/release/tklon
          key: tklon-${{ runner.os }}-${{ hashFiles('generator/**', 'Cargo.toml', 'Cargo.lock', 'rust-toolchain.toml') }}

      # rav1e assembles its x86_64 SIMD with nasm, which the runner lacks.
      - name: Install nasm
        if: steps.tklon.outputs.cache-hit != 'true'
        run: sudo apt-get update && sudo apt-get install -y nasm

      # rustup + rust-toolchain.toml (pinned 1.94.0) provide the compiler.
      # --locked builds the exact versions in Cargo.lock.
      - name: Build the binary
        if: steps.tklon.outputs.cache-hit != 'true'
        run: cargo build --release --locked

      - name: Build the site
        run: ./target/release/tklon build

      # Hand the deploy the exact bytes that were built here, rather than
      # rebuilding them in a second job.
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: site
          path: build/
          retention-days: 1

  # Master only: a pull request runs `build` above and stops there.
  deploy:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    # OIDC: assume the AWS deploy role with a short-lived token (no stored keys).
    # Scoped to this job, so the PR-triggered build is never issued one.
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: site
          path: build

      - uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
        with:
          role-to-assume: arn:aws:iam::295005258746:role/tklondotcom-GitHubActionsDeployRole-KmJpDGB6eg8r
          aws-region: us-east-1

      - name: Sync to S3 and invalidate CloudFront
        run: |
          # Two-pass sync so each bucket of files gets the right Cache-Control:
          #   1. Hashed/immutable assets (CSS, JS, images, fonts) — 1y immutable.
          #      The filename embeds a content hash, so a content change always
          #      ships under a new URL; serving it forever is safe.
          #   2. HTML / feeds — short edge TTL with stale-while-revalidate, so
          #      users never wait on revalidation and updates land in ~5 min.
          # --exclude 'media/*' and 'masters/*': self-hosted videos and the photo
          # originals are uploaded out-of-band and never live in build/; without
          # these, --delete would remove them.
          # Hashed assets ship first so HTML never references a missing file.
          aws s3 sync build/ s3://tklon.com-assets --delete \
            --exclude 'media/*' --exclude 'masters/*' \
            --exclude '*.html' --exclude '*.xml' --exclude '*.txt' \
            --cache-control 'public,max-age=31536000,immutable'
          aws s3 sync build/ s3://tklon.com-assets --delete --exclude '*' \
            --include '*.html' --include '*.xml' --include '*.txt' \
            --cache-control 'public,max-age=60,s-maxage=300,stale-while-revalidate=86400'
          # `/*` — a wildcard only acts as one as the last character, so a path
          # like '/*.html' matches a file literally named that, i.e. nothing.
          # One path, and the free tier covers 1000 a month.
          aws cloudfront create-invalidation --distribution-id E12C54H3GMYHN0 \
            --paths '/*'
