name: process media

# On a post/* PR: download the photos attached to the PR body, fill the post's
# `@` slots (tklon ingest), encode variants + back up masters (tklon images),
# commit the result, and keep a single sticky preview comment in sync.
#
# Only GitHub-/AWS-official actions are used; the sticky comment is inlined with
# the runner's gh CLI rather than an independent-maintainer action.
on:
  pull_request:
    types: [opened, synchronize, edited]

permissions:
  contents: write
  pull-requests: write
  id-token: write

concurrency:
  group: media-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  media:
    # Own-repo post/* branches only. Fork PRs get no secrets/OIDC regardless.
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      startsWith(github.head_ref, 'post/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Locate the post and count `@` slots
        id: scan
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          post=$(gh pr view "$PR" --json files -q '.files[].path' \
                 | grep -E '^site/source/posts/.*\.md$' | head -1 || true)
          echo "post=$post" >> "$GITHUB_OUTPUT"
          count=0
          [ -n "$post" ] && count=$(grep -oE '\]\(@[) ]' "$post" | wc -l | tr -d ' ')
          echo "count=$count" >> "$GITHUB_OUTPUT"
          echo "found $count placeholder(s) in ${post:-<none>}"

      - name: Extract attachment URLs (document order)
        if: steps.scan.outputs.count != '0'
        env:
          BODY: ${{ github.event.pull_request.body }}
        run: |
          set -euo pipefail
          printf '%s' "$BODY" \
            | grep -oE 'https://(github\.com/user-attachments/assets|user-images\.githubusercontent\.com)/[A-Za-z0-9./_-]+' \
            > urls.txt || true
          echo "attachments: $(wc -l < urls.txt | tr -d ' ')"

      - name: Download attachments
        if: steps.scan.outputs.count != '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p media
          i=0
          while IFS= read -r url; do
            [ -z "$url" ] && continue
            i=$((i + 1))
            # auth is used for github.com and stripped on the cross-host S3 redirect
            curl -sSL -H "Authorization: Bearer $GH_TOKEN" "$url" -o "media/att-$i"
          done < urls.txt

      - name: Fill `@` slots (tklon ingest)
        if: steps.scan.outputs.count != '0'
        env:
          POST: ${{ steps.scan.outputs.post }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(media/att-*)
          cargo run --release -- ingest "$POST" "${files[@]}" > names.txt

      - uses: aws-actions/configure-aws-credentials@v4
        if: steps.scan.outputs.count != '0'
        with:
          role-to-assume: arn:aws:iam::295005258746:role/tklondotcom-media-backup
          aws-region: us-east-1

      - name: Encode variants + manifest + back up masters
        if: steps.scan.outputs.count != '0'
        run: cargo run --release -- images

      - name: Commit to the PR branch
        if: steps.scan.outputs.count != '0'
        env:
          BRANCH: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          git config user.name tklon-bot
          git config user.email bot@users.noreply.github.com
          git add site/source/posts site/source/images site/data/images.json
          git commit -m "media: wire in attached photo(s)" || { echo "nothing to commit"; exit 0; }
          git push origin HEAD:refs/heads/"$BRANCH"

      - name: Build preview
        if: steps.scan.outputs.count != '0'
        run: |
          set -euo pipefail
          sha=$(git rev-parse --short HEAD)
          {
            echo "<!-- tklon-media-preview -->"
            echo "### 📸 Media preview · \`$sha\`"
            echo
            echo "| slot | photo |"
            echo "|---|---|"
            paste -d '|' names.txt urls.txt | while IFS='|' read -r name url; do
              [ -z "$name" ] && continue
              echo "| \`$name\` | <img src=\"$url\" width=\"140\"> |"
            done
          } > preview.md

      # Sticky comment via the runner's gh CLI: find our marker comment and PATCH
      # it, or POST a new one. On failure, fall back to a mismatch note under the
      # same marker so it stays one comment.
      - name: Upsert sticky preview comment
        if: always() && steps.scan.outputs.count != '0'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          body=preview.md
          if [ ! -f preview.md ]; then
            printf '%s\n' '<!-- tklon-media-preview -->' \
              '⚠️ Could not wire in the photos — the attachment count did not match the `@` slots, or a file was not JPEG/PNG. See the run log.' > note.md
            body=note.md
          fi
          id=$(gh api "repos/$REPO/issues/$PR/comments" --paginate \
               --jq 'map(select(.body | contains("tklon-media-preview"))) | .[0].id // empty')
          if [ -n "$id" ]; then
            gh api -X PATCH "repos/$REPO/issues/comments/$id" -F "body=@$body" >/dev/null
          else
            gh api -X POST "repos/$REPO/issues/$PR/comments" -F "body=@$body" >/dev/null
          fi
