AWSTemplateFormatVersion: 2010-09-09
Transform: AWS::Serverless-2016-10-31
Description: Creates static web page with a Cloudfront CDN, domain aliases, custom SSL certificate, and CI pipeline.

Parameters:
  AcmCertificateArn:
    AllowedPattern: "arn:aws:acm:.*"
    Default: arn:aws:acm:us-east-1:295005258746:certificate/2f702844-d6e5-4573-8a41-57fcc0c1992b
    Description: The AWS Certificate Manager certificate ARN associated with your top-level domain and www subdomain
    Type: String
  Route53HostZoneName:
    Default: tklon.com
    Description: The Route 53 hosted zone name where DNS records will be created
    Type: String
  GitHubRepositoryOwner:
    Type: String
    Default: teeeg
  GitHubRepositoryName:
    Type: String
    Default: tklon.com
  StatsReportEmail:
    Type: String
    Default: tommyklon@gmail.com
    Description: Address that receives the weekly stats email. SNS sends a one-time confirmation link on stack create/update — click it to start delivery.

Resources:
  WebsiteStaticAssetsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub ${Route53HostZoneName}-assets
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # Raw CloudFront access logs land here. CF standard logging writes via an
  # ACL grant to the awslogsdelivery group, which requires BucketOwnerPreferred
  # (not the modern BucketOwnerEnforced default). Lifecycle expires raw logs
  # after 90 days — headline numbers are preserved forever in the stats bucket.
  WebsiteLogsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub ${Route53HostZoneName}-logs
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerPreferred
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: ExpireRawLogsAfter90Days
            Status: Enabled
            ExpirationInDays: 90

  # Long-lived storage for weekly aggregate JSONs the stats Lambda emits.
  # No lifecycle — files are tiny (<50 KB/week) and we want full history.
  WebsiteStatsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub ${Route53HostZoneName}-stats
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  WebsiteStaticAssetsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref WebsiteStaticAssetsBucket
      PolicyDocument:
        Version: 2012-10-17
        Statement:
          # Origin Access Control: only this exact CloudFront distribution can
          # read the bucket. Authorisation is by service principal + SourceArn
          # rather than the legacy OAI canonical user, and S3 requests are
          # signed with SigV4.
          - Action: "s3:GetObject"
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Resource: !Sub "${WebsiteStaticAssetsBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudfrontDistribution}"

  WebsiteOriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${AWS::StackName}-s3-oac"
        Description: !Sub "OAC for ${Route53HostZoneName} S3 origin"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  CloudfrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Aliases:
          - !Ref Route53HostZoneName
          - !Sub www.${Route53HostZoneName}
        DefaultRootObject: index.html
        CustomErrorResponses:
          - ErrorCode: 403
            ResponsePagePath: "/404.html"
            ResponseCode: 404
        Enabled: true
        HttpVersion: http2and3
        IPV6Enabled: true
        Logging:
          # Standard (legacy) access logs to S3. ~5–60 min delivery delay; gzipped
          # tab-separated files. Used by the weekly stats Lambda. IncludeCookies
          # is false since we don't set any (and they'd add PII otherwise).
          Bucket: !GetAtt WebsiteLogsBucket.DomainName
          Prefix: cloudfront/
          IncludeCookies: false
        Origins:
          # RegionalDomainName (not DomainName) is required with OAC — the
          # legacy global endpoint can fail SigV4 verification for buckets
          # created outside us-east-1.
          - DomainName: !GetAtt WebsiteStaticAssetsBucket.RegionalDomainName
            Id: !Ref WebsiteStaticAssetsBucket
            OriginAccessControlId: !GetAtt WebsiteOriginAccessControl.Id
            S3OriginConfig:
              OriginAccessIdentity: ""
        PriceClass: PriceClass_100
        DefaultCacheBehavior:
          Compress: true
          # AWS-managed "CachingOptimized" policy: caches on URL only (ignores
          # query string + cookies), so tracking params like ?utm_source=… don't
          # shred the cache hit rate. Replaces the legacy ForwardedValues block.
          # https://docs.aws.amazon.com/AmazonCloudFront/latest/DeveloperGuide/using-managed-cache-policies.html
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          # AWS-managed "SecurityHeadersPolicy": adds HSTS, X-Content-Type-Options,
          # X-Frame-Options, Referrer-Policy, and a baseline CSP without any
          # origin-side work. Safe defaults for a static site.
          # https://docs.aws.amazon.com/AmazonCloudFront/latest/DeveloperGuide/using-managed-response-headers-policies.html
          ResponseHeadersPolicyId: 67f7725c-6f97-4210-82d7-5512b31e9d03
          TargetOriginId: !Ref WebsiteStaticAssetsBucket
          ViewerProtocolPolicy: redirect-to-https
          FunctionAssociations:
            - EventType: viewer-request
              FunctionARN: !GetAtt PathRewriteFunction.FunctionMetadata.FunctionARN
        ViewerCertificate:
          AcmCertificateArn: !Ref AcmCertificateArn
          SslSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2021

  PathRewriteFunction:
    Type: AWS::CloudFront::Function
    Properties:
      Name: !Sub "${AWS::StackName}-path-rewrite"
      AutoPublish: true
      FunctionConfig:
        Comment: Redirect www→apex and append index.html to directory URIs
        Runtime: cloudfront-js-2.0
      # !Sub interpolates the apex domain so this function stays generic across
      # stacks. The www→apex 301 collapses the two hostnames into one canonical
      # origin (better cache hit rate, single set of SEO signals).
      FunctionCode: !Sub |
        function handler(event) {
          var request = event.request;
          var host = request.headers.host && request.headers.host.value;
          if (host === 'www.${Route53HostZoneName}') {
            return {
              statusCode: 301,
              statusDescription: 'Moved Permanently',
              headers: { location: { value: 'https://${Route53HostZoneName}' + request.uri } }
            };
          }
          request.uri = request.uri.replace(/\/$/, '/index.html');
          return request;
        }

  DNSAliasNames:
    Type: AWS::Route53::RecordSetGroup
    Description: Alias names must match cloudfront aliases, see "CloudfrontDistribution:DistributionConfig:Aliases"
    DependsOn:
      - CloudfrontDistribution
    Properties:
      HostedZoneName: !Sub "${Route53HostZoneName}."
      RecordSets:
        - Name: !Sub "www.${Route53HostZoneName}"
          Type: AAAA
          AliasTarget:
            HostedZoneId: Z2FDTNDATAQYW2
            DNSName: !GetAtt CloudfrontDistribution.DomainName
        - Name: !Ref Route53HostZoneName
          Type: AAAA
          AliasTarget:
            HostedZoneId: Z2FDTNDATAQYW2
            DNSName: !GetAtt CloudfrontDistribution.DomainName
        - Name: !Sub "www.${Route53HostZoneName}"
          Type: A
          AliasTarget:
            HostedZoneId: Z2FDTNDATAQYW2
            DNSName: !GetAtt CloudfrontDistribution.DomainName
        - Name: !Ref Route53HostZoneName
          Type: A
          AliasTarget:
            HostedZoneId: Z2FDTNDATAQYW2
            DNSName: !GetAtt CloudfrontDistribution.DomainName

  GitHubOidcProvider:
    Type: AWS::IAM::OIDCProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      ThumbprintList:
        - 6938fd4d98bab03faadb97b34396831e3780aea1
        - 1c58a3a8518e8759bf075b76b750d4f2df264fcd

  GitHubActionsDeployRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Ref GitHubOidcProvider
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
                token.actions.githubusercontent.com:sub: !Sub "repo:${GitHubRepositoryOwner}/${GitHubRepositoryName}:ref:refs/heads/master"
      Policies:
        - PolicyName: DeployContent
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - s3:ListBucket
                  - s3:GetBucketLocation
                Resource: !GetAtt WebsiteStaticAssetsBucket.Arn
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:DeleteObject
                Resource: !Sub "${WebsiteStaticAssetsBucket.Arn}/*"
              - Effect: Allow
                Action: cloudfront:CreateInvalidation
                Resource: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudfrontDistribution}"

  # Email channel for the weekly stats report. Subscribing by email requires
  # the recipient to confirm via a link AWS sends on subscription creation —
  # the topic won't deliver until that's clicked once.
  StatsReportTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub "${AWS::StackName}-stats-report"
      DisplayName: tklon stats

  StatsReportSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref StatsReportTopic
      Protocol: email
      Endpoint: !Ref StatsReportEmail

  # Weekly stats Lambda. Reads the last 7 days of CloudFront access logs from
  # WebsiteLogsBucket, publishes a plain-text summary to StatsReportTopic, and
  # archives a per-week aggregate JSON to WebsiteStatsBucket. Code lives in
  # deploy/lambda/stats_report.py and is the same module `make stats` invokes
  # locally for ad-hoc reports — one source of truth for what's in the email.
  StatsReportFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-stats-report"
      Description: Weekly access-log summary for tklon.com
      CodeUri: lambda/
      Handler: stats_report.lambda_handler
      Runtime: python3.12
      Timeout: 120
      MemorySize: 256
      Environment:
        Variables:
          LOGS_BUCKET: !Ref WebsiteLogsBucket
          STATS_BUCKET: !Ref WebsiteStatsBucket
          SNS_TOPIC_ARN: !Ref StatsReportTopic
          SITE_URL: !Sub "https://${Route53HostZoneName}"
      Policies:
        - Version: 2012-10-17
          Statement:
            - Effect: Allow
              Action: [s3:GetObject, s3:ListBucket]
              Resource:
                - !GetAtt WebsiteLogsBucket.Arn
                - !Sub "${WebsiteLogsBucket.Arn}/*"
            - Effect: Allow
              Action: [s3:GetObject, s3:PutObject, s3:ListBucket]
              Resource:
                - !GetAtt WebsiteStatsBucket.Arn
                - !Sub "${WebsiteStatsBucket.Arn}/*"
            - Effect: Allow
              Action: sns:Publish
              Resource: !Ref StatsReportTopic
      Events:
        WeeklyReport:
          Type: Schedule
          Properties:
            Schedule: cron(0 13 ? * MON *)
            Description: Mondays 13:00 UTC (~8am ET)

  # Declare the LogGroup explicitly so we control retention. Without this,
  # Lambda auto-creates one with no expiration and logs accumulate forever.
  StatsReportFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${AWS::StackName}-stats-report"
      RetentionInDays: 30

Outputs:
  GitHubActionsRoleArn:
    Description: Role assumed by the GitHub Actions deploy workflow via OIDC
    Value: !GetAtt GitHubActionsDeployRole.Arn
  StatsReportTopicArn:
    Description: SNS topic that emits the weekly stats report
    Value: !Ref StatsReportTopic
