version: 0.2
phases:
  install:
    runtime-versions:
      ruby: 3.4
      nodejs: 24
    commands:
      - gem install bundler -v 2.6.9
  pre_build:
    commands:
      - cd src
      # use CodeBuild's runtime-versions Ruby; the local exact-patch pin isn't installed here
      - rm -f .ruby-version
      - bundle install
      - npm install
  build:
    commands:
      - NO_CONTRACTS=true bundle exec middleman build
      - aws s3 sync build/ s3://$S3_BUCKET --delete
      - aws cloudfront create-invalidation --distribution-id $CLOUDFRONT_DISTRIBUTION_ID --paths "/*"
